name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: pytest
        run: uv run pytest

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy lookout
