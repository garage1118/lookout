name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: pytest
        run: uv run pytest

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy lookout

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # No push -- this only proves the Dockerfile itself still builds.
      # publish.yml is otherwise the first place a Dockerfile regression
      # would surface, at actual release time.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
